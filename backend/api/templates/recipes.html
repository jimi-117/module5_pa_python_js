<!DOCTYPE html>
<html>
<head>
    <title>Recipe List</title>
</head>
<body>
    <h1>Recipes</h1>
    
    <ul>
        {% for recipe in recipes %}
            <li>{{ recipe.recipe_name }}</li>
        {% endfor %}
    </ul>

    <form method="GET">
        <input type="text" name="search" placeholder="Search recipes...">
        <button type="submit">Search</button>
    </form>
</body>
</html>
